"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 2000

# Prompt layout
format = """
($package\
$c\
$rust\
$golang\
$nodejs\
$bun\
$java\
$maven\
$python\
\n)\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$fill\
$line_break\
$character"""

